<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Before You Build | Analyzing Project...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
	html {
            scrollbar-gutter: stable;
	}
        :root { --bg-main: #050505; --accent-purple: #a855f7; }
        body { background-color: var(--bg-main); font-family: 'Inter', sans-serif; color: #e5e7eb; min-height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* STAR ENGINE Layer */
        .space-container { position: fixed; inset: 0; z-index: -2; background: radial-gradient(circle at center, #0f172a 0%, #050505 100%); overflow: hidden; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0; pointer-events: none; box-shadow: 0 0 10px white; }

        .glitch { position: relative; font-weight: 800; text-transform: uppercase; }
        .glitch::before, .glitch::after { content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .glitch::before { left: 2px; text-shadow: -2px 0 #ff00c1; clip: rect(44px, 450px, 56px, 0); animation: glitch-anim 5s infinite linear alternate-reverse; }
        .glitch::after { left: -2px; text-shadow: -2px 0 #00fff9; clip: rect(44px, 450px, 56px, 0); animation: glitch-anim2 5s infinite linear alternate-reverse; }
        @keyframes glitch-anim { 0% { clip: rect(10px, 9999px, 20px, 0); } 100% { clip: rect(80px, 9999px, 100px, 0); } }
        @keyframes glitch-anim2 { 0% { clip: rect(30px, 9999px, 50px, 0); } 100% { clip: rect(0px, 9999px, 10px, 0); } }

        .ads-frame { border: 1px solid rgba(168, 85, 247, 0.15); background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); position: relative; }
        .ads-label { position: absolute; top: -10px; right: 10px; background: #A855F7; color: white; font-size: 8px; padding: 2px 6px; font-weight: bold; }
        .log-entry { font-size: 10px; color: #A855F7; margin-bottom: 4px; opacity: 0; animation: fadeIn 0.3s forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .progress-fill { transition: width 0.1s linear; box-shadow: 0 0 15px #A855F7; }
    </style>
</head>
<body class="flex flex-col">
    <div class="space-container" id="starfield"></div>

    <nav class="w-full p-6 md:px-12 flex justify-between items-center border-b border-white/10 backdrop-blur-md h-[80px] sticky top-0 z-50 bg-black/90">
    <div class="text-2xl font-black tracking-tighter text-white uppercase cursor-pointer" onclick="location.href='index.html'">
        Before <span class="text-purple-500">You</span> Build
    </div>
    
    <div class="flex items-center gap-4 bg-purple-500/10 px-4 py-2 rounded border border-purple-500/30">
        <div class="h-2 w-2 rounded-full bg-green-500 animate-pulse shadow-[0_0_10px_#22c55e]"></div>
        <div class="text-[10px] mono text-purple-300 tracking-widest uppercase font-bold">Diagnostic Core: Online</div>
    </div>
    </nav>

    <main class="flex-1 flex flex-col items-center justify-center p-6 relative z-10">
        <div class="max-w-5xl w-full space-y-10 text-center">
            <div class="space-y-4">
                <div class="inline-block px-3 py-1 border border-purple-500/30 bg-purple-500/5 mono text-[10px] text-purple-400 tracking-[0.3em] uppercase">Diagnostic Engine Running</div>
                <h1 class="text-5xl md:text-7xl font-black text-white glitch" data-text="ANALYZING PROJECT">ANALYZING PROJECT</h1>
            </div>

            <div class="grid md:grid-cols-3 gap-6">
                <div class="md:col-span-1 bg-black/40 border border-white/10 p-6 text-left h-[380px] flex flex-col backdrop-blur-md">
                    <div class="text-[9px] mono text-gray-500 uppercase mb-4 border-b border-white/10 pb-2 italic">System_Logs.log</div>
                    <div id="log-container" class="mono overflow-hidden flex-1"></div>
                </div>

                <div class="md:col-span-2 space-y-6 flex flex-col">
                    <div class="ads-frame flex-1 flex flex-col items-center justify-center p-6 min-h-[280px]">
                        <span class="ads-label mono uppercase tracking-widest">Sponsor Message</span>
                        <div id="ads-content" class="text-center space-y-4">
                            <p id="insight-text" class="text-lg italic text-gray-300 max-w-md transition-all duration-500">"Scaling your team doesn't scale your output linearly."</p>
                        </div>
                    </div>

                    <div class="bg-black/40 border border-white/10 p-6 space-y-4 backdrop-blur-md">
                        <div class="flex justify-between mono text-[10px] uppercase tracking-widest">
                            <span id="status-text" class="text-cyan-400 italic">Processing Data...</span>
                            <span id="percent-text" class="text-white">0%</span>
                        </div>
                        <div class="w-full h-[2px] bg-gray-800 relative">
                            <div id="progress-fill" class="h-full bg-purple-500 progress-fill" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="action-btn" class="opacity-0 pointer-events-none transition-all duration-1000 transform translate-y-4">
                <button onclick="location.href='byb-result.html'" class="px-16 py-5 bg-white text-black font-black mono text-xs tracking-[0.3em] uppercase hover:bg-purple-600 hover:text-white transition-all">
                    Access Verdict →
                </button>
            </div>
        </div>
    </main>

    <footer class="p-6 text-center border-t border-white/10 bg-black/90 z-50">
        <div class="opacity-80 uppercase tracking-[1.2em] text-[10px] mono text-gray-400 font-bold">
            Mental Audit & Diagnostic System // 2026
        </div>
    </footer>

    <script>
        const starContainer = document.getElementById('starfield');
        let starAnimations = [];
        function createStar() {
            const star = document.createElement('div'); star.className = 'star';
            const sizeVal = Math.random() * 5 + 2; star.style.width = sizeVal + 'px'; star.style.height = sizeVal + 'px';
            if(sizeVal > 5) star.style.filter = 'blur(1px)';
            star.style.left = '50%'; star.style.top = '50%';
            const angle = Math.random() * Math.PI * 2; const xDir = Math.cos(angle); const yDir = Math.sin(angle);
            const duration = (Math.random() * 4000 + 2000);
            const anim = star.animate([ { transform: 'translate(-50%, -50%) translate(0, 0) scale(0)', opacity: 0 }, { opacity: 1, offset: 0.2 }, { transform: `translate(-50%, -50%) translate(${xDir * 110}vw, ${yDir * 110}vh) scale(1.5)`, opacity: 0 } ], { duration: duration, iterations: Infinity, delay: Math.random() * 5000, easing: 'ease-in' });
            anim.playbackRate = 1.3; starAnimations.push(anim); starContainer.appendChild(star);
        }
        for (let i = 0; i < 150; i++) createStar();

        const logs = ["Initializing neural audit...", "Loading Team Capacity matrices...", "Validating Production Velocity...", "Calculating Content Debt index...", "Running Hard-Truth simulations...", "Analyzing Market Battlefield...", "Detecting potential bottlenecks...", "Cross-referencing DNA vs. Reality...", "Compiling final report...", "Engine Ready."];
        const insights = ["Reality Check: Hope is not a management strategy.", "Visual Fidelity level 5 with a 3-man team is a suicide mission.", "Code complexity scales exponentially, not linearly.", "Your monetization strategy must match your player mastery level."];

        let currentProgress = 0; let logIdx = 0;
        const logTimer = setInterval(() => {
            if (logIdx < logs.length) {
                const p = document.createElement('p'); p.className = 'log-entry mono'; p.innerText = `> ${logs[logIdx]}`;
                document.getElementById('log-container').appendChild(p); logIdx++;
            } else { clearInterval(logTimer); }
        }, 700);

        setInterval(() => {
            const txt = document.getElementById('insight-text'); txt.style.opacity = 0;
            setTimeout(() => { txt.innerText = `"${insights[Math.floor(Math.random() * insights.length)]}"`; txt.style.opacity = 1; }, 500);
        }, 3500);

        const progTimer = setInterval(() => {
            if (currentProgress < 100) {
                currentProgress += 0.4;
                document.getElementById('progress-fill').style.width = currentProgress + '%';
                document.getElementById('percent-text').innerText = Math.floor(currentProgress) + '%';
            } else {
                clearInterval(progTimer);
                document.getElementById('status-text').innerText = "Analysis Complete";
                document.getElementById('status-text').className = "text-green-500 italic";
                document.getElementById('action-btn').classList.remove('opacity-0', 'pointer-events-none', 'translate-y-4');
                starAnimations.forEach(anim => anim.playbackRate = 1.0);
            }
        }, 40);
    </script>
</body>
</html>
